<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Billiard Racking System</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="theme-color" content="#ff3c00" />

<style>
  :root{
  --bg:#05030a;
  --bg2:#0d0617;
  --panel: rgba(20,10,32,0.88);
  --panel-soft: rgba(32,16,48,0.72);
  --border: rgba(212,169,74,0.22);
  --border2: rgba(123,63,242,0.22);
  --text:#f8f4ff;
  --muted: rgba(248,244,255,0.80);

  --purple-1:#1a0d2b;
  --purple-2:#35125b;
  --purple-3:#5e239d;
  --purple-4:#8e48d7;

  --gold:#f0b93a;
--gold-2:#ffd457;
--gold-deep:#b88410;
--accent:#ffd457;
--warn:#d7ba74;


  --accent:#e4bf6b;
  --warn:#d8b980;
}


  *{ box-sizing:border-box; }

  body{
  margin:0;
  font-family:"Segoe UI", Roboto, Arial, sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at 18% 22%, rgba(94,35,157,0.26) 0%, transparent 34%),
    radial-gradient(circle at 82% 18%, rgba(200,154,61,0.10) 0%, transparent 22%),
    radial-gradient(circle at 76% 72%, rgba(53,18,91,0.34) 0%, transparent 36%),
    linear-gradient(180deg, #14091f 0%, #09050f 48%, #040208 100%);
  background-attachment: fixed;
}


  .header{
  position: relative;
  text-align:center;
  padding:8px 20px 4px;
  border-bottom: 1px solid rgba(200,154,61,0.16);
  background:
    linear-gradient(180deg, rgba(94,35,157,0.12) 0%, rgba(0,0,0,0) 100%);
}
.header::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 50% 0%, rgba(142,72,215,0.24) 0%, rgba(94,35,157,0.12) 20%, transparent 46%);
}
  .event-logo{
    height: clamp(320px, 40vw, 500px);
    margin: 0 auto 1px;
    object-fit: contain;
    display:block;
    max-width: 100%;
  }

  .header h1{
  margin:1px 0 0;
  font-size:34px;
  letter-spacing:0.10em;
  text-transform:uppercase;
  font-weight:800;
  color:#ffe3a0;
  text-shadow:
    0 0 16px rgba(94,35,157,0.18),
    0 2px 0 rgba(184,130,18,0.35);
}

.header h2{
  margin:8px 0 0;
  font-size:22px;
  font-weight:600;
  color:#ffd15a;
  letter-spacing:0.04em;
}

.header h3{
  margin:6px 0 0;
  font-size:18px;
  font-weight:500;
  color:rgba(248,244,255,0.88);
}


  .container{
  max-width:900px;
  margin:40px auto;
  padding:24px 30px 36px;
  background: linear-gradient(180deg, rgba(26,13,43,0.92) 0%, rgba(12,7,20,0.94) 100%);
  border-radius:18px;
  border:1px solid var(--border);
  box-shadow:
    0 18px 46px rgba(0,0,0,0.48),
    0 0 0 1px rgba(200,154,61,0.05) inset,
    0 0 28px rgba(94,35,157,0.16);
}
  .section-title{
  font-size:20px;
  font-weight:700;
  border-left:4px solid var(--gold);
  padding-left:12px;
  margin: 0 0 14px;
  color:#ffe7a8;
  letter-spacing:0.03em;
}

  /* 默认 info（给联系方式/赛程这种可稍大块使用） */
  .info{
    font-size:15px;
    opacity:0.92;
    line-height:1.7;
    margin:0 0 28px;
  }

  /* 统一“说明性文本”（Notification/Regulations/Player Info 上方提示等） */
  .desc{
    margin: 8px 0;
    font-size:14px;
    line-height:1.7;
    color: rgba(255,255,255,0.92);
    font-weight:500;
  }
  .desc strong{ font-weight:800; }
  .em{
  color: var(--gold-2);
  font-size:16px;
  font-weight:900;
}

.em.big{
  color:var(--gold-2);
  font-size:17px;
}

	.em,
.em.big,
.em-red{
  text-shadow: 0 0 8px rgba(255,209,90,0.10);
}
  /* ========== FORM GRID ========== */
  .reg-form{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px 28px;
  }
  .full-row{ grid-column: 1 / -1; }

  /* 只影响字段标题，不影响里面的 option label */
  .field > label{
    display:block;
    font-size:14px;
    margin:0 0 6px;
    opacity:0.88;
  }

  .field input,
.field textarea,
.field select{
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid rgba(200,154,61,0.18);
  background: linear-gradient(180deg, rgba(24,13,38,0.96) 0%, rgba(13,8,22,0.98) 100%);
  color:#fff;
  font-size:15px;
}
	.field input:focus,
.field textarea:focus,
.field select:focus{
  outline:none;
  border-color: rgba(228,191,107,0.62);
  box-shadow:
    0 0 0 2px rgba(200,154,61,0.10),
    0 0 14px rgba(94,35,157,0.20);
}

  /* ========== DECLARATION ========== */
  .declaration{
  background: linear-gradient(180deg, rgba(39,21,61,0.72) 0%, rgba(20,11,31,0.78) 100%);
  border-radius:12px;
  padding:10px 12px;
  border:1px solid rgba(200,154,61,0.14);
}

  .declaration label{
    display:flex;
    align-items:flex-start;
    gap:8px;
    font-size:13px;
    line-height:1.5;
    opacity:0.92;
    cursor:pointer;
    margin:0;
  }

  .declaration input[type="checkbox"]{
    margin-top:2px;
    width:auto;
    min-width:16px;
    height:16px;
  }

  /* ========== CATEGORY HORIZONTAL ========== */
  .category-options{
  display:flex;
  gap:16px;
  flex-wrap:wrap;
  align-items:center;
  padding:12px 14px;
  border:1px solid rgba(200,154,61,0.14);
  border-radius:12px;
  background: linear-gradient(180deg, rgba(44,22,68,0.54) 0%, rgba(22,12,34,0.52) 100%);
}

  .category-options > label{
    display:inline-flex !important;
    align-items:center;
    gap:8px;
    margin:0;
    cursor:pointer;
    font-size:15px;
  }
  .category-options input[type="radio"]{ width:auto; }

  /* ========== SUBMIT BUTTON ========== */
  .submit-row{
    grid-column: 1 / -1;
    text-align:right;
    margin-top:10px;
  }

  button{
  padding: 14px 36px;
  min-width: 250px;
  border-radius: 999px;
  border: 1px solid rgba(255,212,87,0.34);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0) 18%),
    linear-gradient(135deg, #1a0a2d 0%, #2d0f4d 34%, #4a1b79 70%, #6a2ab0 100%);
  color: #ffe29a;
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  text-shadow: 0 1px 2px rgba(0,0,0,0.45);
  box-shadow:
    0 12px 24px rgba(0,0,0,0.42),
    0 0 0 1px rgba(255,255,255,0.02) inset,
    0 0 0 1px rgba(255,212,87,0.06),
    0 0 18px rgba(106,42,176,0.14);
  transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, filter 0.18s ease;
}

button:hover:not(:disabled){
  transform: translateY(-1px);
  border-color: rgba(255,212,87,0.48);
  box-shadow:
    0 14px 28px rgba(0,0,0,0.48),
    0 0 0 1px rgba(255,255,255,0.03) inset,
    0 0 22px rgba(106,42,176,0.20);
  filter: brightness(1.04);
}


button:active:not(:disabled){
  transform: translateY(0);
  box-shadow:
    0 8px 18px rgba(0,0,0,0.36),
    0 0 0 1px rgba(255,255,255,0.03) inset;
  filter: brightness(0.98);
}

button:disabled{
  opacity: 0.42;
  cursor: not-allowed;
}



  .payment-note{
    font-size:12px;
    color: var(--warn);
    margin-top:6px;
    text-align:right;
  }

  /* 防长地址/邮箱撑破 */
  .container, .info, .declaration, .payment-note, a, span{
    overflow-wrap:anywhere;
    word-break:break-word;
  }

.notification-block .desc{
  margin: 0 0 18px;
  font-size: 14px;
  line-height: 1.85;
  color: rgba(255,255,255,0.92);
  font-weight: 500;
}

.notification-block .desc strong{
  display: inline-block;
  margin-bottom: 4px;
  font-weight: 800;
}

@media (max-width: 720px){
  .notification-block .desc{
    font-size: 13px;
    line-height: 1.75;
    margin-bottom: 16px;
  }
}


  /* ========== PAYMENT TYPOGRAPHY (你原本那套保留并优化) ========== */
  .pay-info{ margin-top:-6px; }

  .pay-line{
    margin: 8px 0;
    font-size: 14px;
    line-height: 1.7;
    color: rgba(255,255,255,0.92);
    font-weight:500;
  }

  .pay-line.zh{ margin-top: 14px; }

  .pay-box{
  margin-top:10px;
  padding:12px 14px;
  border:1px solid rgba(212,169,74,0.14);
  border-radius:12px;
  background: linear-gradient(180deg, rgba(45,24,69,0.52) 0%, rgba(27,15,43,0.42) 100%);
}

  .pay-subtitle{
  margin:0 0 8px;
  font-size:14px;
  font-weight:800;
  color:#f3d98a;
}

  .pay-list{
    margin: 0 0 8px 18px;
    padding: 0;
    font-size: 14px;
    line-height: 1.7;
    color: rgba(255,255,255,0.92);
  }

  .pay-warning{
    margin: 10px 0 0;
    font-size: 13px;
    line-height: 1.6;
    color: var(--warn);
    font-weight: 800;
  }

  .pay-note{
    margin: 12px 0 0;
    font-size: 13px;
    line-height: 1.6;
    color: var(--warn);
  }

.em-red{
  color:#f3d98a;
  font-size:16px;
  font-weight:900;
}
	.pay-warning,
.pay-note,
.payment-note{
  color: var(--warn);
}

.guide-card{
  margin-bottom:18px;
}

.guide-link{
  display:inline-block;
  margin-top:10px;
  padding:11px 20px;
  border-radius:999px;
  border:1px solid rgba(255,212,87,0.28);
  background: linear-gradient(135deg, #26103f 0%, #3d1764 55%, #5f25a1 100%);
  color:#ffe29a;
  text-decoration:none;
  font-weight:700;
  letter-spacing:0.04em;
  box-shadow:
    0 10px 20px rgba(0,0,0,0.30),
    0 0 0 1px rgba(255,255,255,0.02) inset;
  transition: transform 0.18s ease, filter 0.18s ease, box-shadow 0.18s ease;
}

.guide-link:hover{
  transform: translateY(-1px);
  filter: brightness(1.04);
  box-shadow:
    0 12px 24px rgba(0,0,0,0.36),
    0 0 16px rgba(106,42,176,0.14);
}

  /* ========== MOBILE ========== */
  @media (max-width: 720px){
    body{ font-size:14px; }

    .header{ padding:10px 14px 12px; }
    .event-logo{ height: clamp(240px, 66vw, 350px); }

    .header h1{ font-size:24px; }
    .header h2{ font-size:18px; }
    .header h3{ font-size:15px; }

    .container{
      margin:22px 12px;
      padding:18px 16px 24px;
    }

    .section-title{ font-size:17px; margin-bottom:10px; }
    .info{ font-size:14px; line-height:1.6; margin-bottom:18px; }

    .desc{ font-size:13px; line-height:1.6; }
    .em{ font-size:15px; }
    .em.big{ font-size:16px; }

    .reg-form{
      grid-template-columns: 1fr;
      gap:14px;
    }

    .submit-row{ text-align:center; }
    button{ width:100%; }

    .field > label{ font-size:13px; }
    .field input, .field select{ font-size:14px; padding:9px 10px; }

    .declaration label{ font-size:12.5px; }

    .category-options{ gap:12px; }
    .category-options > label{ font-size:14px; }
    .payment-note{ text-align:center; }

    .pay-line, .pay-list{ font-size: 13px; }
    .em-red{ font-size: 15px; }
    .pay-warning, .pay-note{ font-size: 12.5px; }
  }
</style>
</head>

<body>
  <header>
    <div class="container header-content">
      <img src="./icons/2026APC_final.png" alt="Logo" class="site-logo">
      <div class="header-text">
        <h1>Billiard Racking System</h1>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="control-panel">
      <h2>Switch Protocol</h2>
      <div class="btn-group">
        <button id="nineBallBtn">9 Ball</button>
        <button id="tenBallBtn">10 Ball</button>
        <button id="shuffleBtn" class="shuffle-btn">Reshuffle</button>
      </div>
    </div>

    <div class="table-container">
      <div class="table-surface" id="tableSurface">
        <img src="./icons/logo-andy.png" class="andy-side-logo logo-left">
        <img src="./icons/logo-andy.png" class="andy-side-logo logo-right">

        <div class="spot"></div>
        <div id="ballsContainer"></div>
      </div>
    </div>
  </div>

  <footer>
    <p>OFFICIAL RACK SYSTEM</p>
    <p style="margin-top: 5px;">© 2026 Rack Assistant</p>
  </footer>

  <script>
    // 经典色值方案
    const ballColors = {
      1: '#FFCC00', 2: '#0066FF', 3: '#FF0000', 4: '#9900CC', 5: '#FF9900',
      6: '#00CC66', 7: '#CC6600', 8: '#000000',
      9: 'radial-gradient(circle at 30% 30%, white 0%, white 45%, #FFCC00 45%, #FFCC00 100%)',
      10:'radial-gradient(circle at 30% 30%, white 0%, white 45%, #0066FF 45%, #0066FF 100%)'
    };

    const textColors = {
      1: '#000', 2: '#FFF', 3: '#FFF', 4: '#FFF', 5: '#000',
      6: '#000', 7: '#FFF', 8: '#FFF', 9: '#000', 10: '#000'
    };

    let currentGameType = 'nine';

    const nineBallBtn = document.getElementById('nineBallBtn');
    const tenBallBtn  = document.getElementById('tenBallBtn');
    const shuffleBtn  = document.getElementById('shuffleBtn');
    const ballsContainer = document.getElementById('ballsContainer');
    const tableSurface = document.getElementById('tableSurface');

    function updateButtons(){
      nineBallBtn.className = currentGameType === 'nine' ? 'active-btn' : 'inactive-btn';
      tenBallBtn.className  = currentGameType === 'ten'  ? 'active-btn' : 'inactive-btn';
    }

    function shuffle(arr){
      for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function generateOrder(type){
      if(type === 'nine'){
        const others = [2,3,4,5,6,7,8];
        shuffle(others);
        return [1, others[0], others[1], others[2], 9, others[3], others[4], others[5], others[6]];
      }else{
        const others = [2,3,4,5,6,7,8,9];
        shuffle(others);
        return [1, others[0], others[1], others[2], 10, others[3], others[4], others[5], others[6], others[7]];
      }
    }

    function calculatePositions(type, ballSize){
      const positions = [];
      const gapRatio = 0.505;

      if(type === 'nine'){
        const hGap = ballSize * gapRatio;
        const vGap = ballSize * 0.81;
        const rowY = [-2, -1, 0, 1, 2];

        positions.push({ x: 0,          y: rowY[0] * vGap });
        positions.push({ x: -0.7*hGap,  y: rowY[1] * vGap });
        positions.push({ x:  0.7*hGap,  y: rowY[1] * vGap });
        positions.push({ x: -1.4*hGap,  y: rowY[2] * vGap });
        positions.push({ x: 0,          y: rowY[2] * vGap });
        positions.push({ x:  1.4*hGap,  y: rowY[2] * vGap });
        positions.push({ x: -0.7*hGap,  y: rowY[3] * vGap });
        positions.push({ x:  0.7*hGap,  y: rowY[3] * vGap });
        positions.push({ x: 0,          y: rowY[4] * vGap });
      }else{
        const gap = ballSize * 0.91;
        const rowY = [-1.5, -0.5, 0.5, 1.5];

        positions.push({ x: 0,        y: rowY[0] * gap });
        positions.push({ x: -0.5*gap, y: rowY[1] * gap });
        positions.push({ x:  0.5*gap, y: rowY[1] * gap });
        positions.push({ x: -1*gap,   y: rowY[2] * gap });
        positions.push({ x: 0,        y: rowY[2] * gap });
        positions.push({ x:  1*gap,   y: rowY[2] * gap });
        positions.push({ x: -1.5*gap, y: rowY[3] * gap });
        positions.push({ x: -0.5*gap, y: rowY[3] * gap });
        positions.push({ x:  0.5*gap, y: rowY[3] * gap });
        positions.push({ x:  1.5*gap, y: rowY[3] * gap });
      }

      return positions;
    }

    function clamp(n, min, max){
      return Math.max(min, Math.min(max, n));
    }

    // ✅ 统一比例：ballSize & fontSize 都由“桌面可用宽度”计算
    function computeBallSize(){
      // 使用 tableSurface 的可用宽度（比 ballsContainer 更稳定）
      const w = tableSurface.clientWidth;

      // 9球：宽度约 3 个球 + 间距；10球：约 4 个球 + 间距
      // 用更稳定的“占宽比例”算直径
      const base = (currentGameType === 'nine')
        ? Math.floor(w / 7.2)   // 9球稍大
        : Math.floor(w / 8.6);  // 10球稍小

      // 给一个合理 clamp：小屏不爆，大屏够大
      return clamp(base, 30, 110);
    }

    function computeFontSize(ballSize){
      // 数字大小 = 球直径的比例（统一比例核心）
      // 你之前希望更大：0.46~0.50 都可以
      const fs = Math.floor(ballSize * 0.48);
      return clamp(fs, 14, 46);
    }

    function renderBalls(){
      ballsContainer.innerHTML = '';

      const ballSize = computeBallSize();
      const fontSize = computeFontSize(ballSize);

      const order = generateOrder(currentGameType);
      const positions = calculatePositions(currentGameType, ballSize);

      order.forEach((num, index) => {
        const pos = positions[index];
        const ball = document.createElement('div');
        ball.className = 'ball';

        ball.style.width = ballSize + 'px';
        ball.style.height = ballSize + 'px';
        ball.style.left = `calc(50% + ${pos.x}px)`;
        ball.style.top  = `calc(50% + ${pos.y}px)`;

        ball.style.background = ballColors[num];
        ball.style.color = textColors[num];
        ball.style.fontSize = fontSize + 'px';

        ball.textContent = num;
        ballsContainer.appendChild(ball);

        setTimeout(() => ball.classList.add('animate-drop'), index * 35);
      });
    }

    nineBallBtn.addEventListener('click', () => {
      currentGameType = 'nine';
      updateButtons();
      renderBalls();
    });

    tenBallBtn.addEventListener('click', () => {
      currentGameType = 'ten';
      updateButtons();
      renderBalls();
    });

    shuffleBtn.addEventListener('click', () => {
      renderBalls();
    });

    // ✅ ResizeObserver：比 window.resize 更可靠（PWA/地址栏变化/横竖切换）
    const ro = new ResizeObserver(() => renderBalls());
    ro.observe(tableSurface);

    document.addEventListener('DOMContentLoaded', () => {
      updateButtons();
      renderBalls();
    });
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js")
          .then(() => console.log("Service Worker registered"))
          .catch(err => console.log("SW registration failed:", err));
      });
    }
  </script>
</body>
</html>
