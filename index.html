<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Billiard Racking System</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="theme-color" content="#ff3c00" />

  <style>
    :root{
      --violet-bright:#c27cff;
      --violet-neon:#9d4dff;
      --violet-deep:#4e237f;
      --violet-ink:#18081f;
      --gold-main:#d8a93f;
      --gold-soft:#f5d98f;
      --gold-hot:#ffd36b;
      --gold-shadow:#7a5a1d;
      --bg-dark:#0b0311;
      --panel-bg:rgba(23, 9, 36, 0.74);
      --panel-border:rgba(216, 169, 63, 0.44);
      --table-wood:#161217;
      --table-trim:#d7b970;
      --felt:#666666;

      --table-max: 1100px;
      --table-vw: 96vw;
      --rail: clamp(12px, 2.2vw, 26px);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    }

    body{
      position:relative;
      background-color:var(--bg-dark);
      background-image:
        radial-gradient(circle at 50% 100%, rgba(157, 77, 255, 0.28) 0%, transparent 64%),
        radial-gradient(circle at 82% 18%, rgba(255, 211, 107, 0.14) 0%, transparent 24%),
        radial-gradient(circle at 15% 8%, rgba(216, 169, 63, 0.12) 0%, transparent 32%),
        linear-gradient(180deg, #120419 0%, #170624 45%, #09030f 100%);
      background-attachment:fixed;
      min-height:100vh;
      padding-bottom:20px;
      color:#f6f0ff;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:0.18;
      background:
        linear-gradient(transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%),
        repeating-linear-gradient(
          90deg,
          transparent 0 32px,
          rgba(194, 124, 255, 0.06) 32px 33px,
          transparent 33px 66px
        );
      mix-blend-mode:screen;
    }

    body::after{
      content:"";
      position:fixed;
      inset:auto 0 0 0;
      height:38vh;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 100%, rgba(255, 185, 54, 0.14) 0%, transparent 48%),
        radial-gradient(circle at 50% 100%, rgba(157, 77, 255, 0.18) 0%, transparent 62%);
      filter:blur(18px);
    }

    header{
      background:
        linear-gradient(180deg, rgba(65, 22, 97, 0.96) 0%, rgba(13, 6, 21, 0.96) 100%);
      border-bottom:3px solid var(--gold-main);
      box-shadow:
        0 10px 30px rgba(0,0,0,0.28),
        0 0 24px rgba(157, 77, 255, 0.16);
      padding:26px 20px;
    }

    .container{
      width:100%;
      max-width:1200px;
      margin:0 auto;
      padding:15px;
    }

    .header-content{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .site-logo{
      width: clamp(220px, 26vw, 380px);
      height:auto;
      object-fit:contain;
      margin-bottom:12px;
      filter:
        drop-shadow(0 0 10px rgba(216, 169, 63, 0.4))
        drop-shadow(0 0 22px rgba(157, 77, 255, 0.34));
    }

    header h1{
      font-size: clamp(1.1rem, 4.2vw, 1.8rem);
      text-transform:uppercase;
      letter-spacing:2px;
      color:var(--gold-soft);
      text-shadow:
        0 0 14px rgba(216, 169, 63, 0.3),
        0 0 28px rgba(157, 77, 255, 0.18);
    }

    header p{
      color:#c6b6d8;
      font-size:0.85rem;
      margin-top:6px;
    }

    .control-panel{
      background:var(--panel-bg);
      border:1px solid var(--panel-border);
      border-radius:12px;
      padding:20px;
      margin:10px 0 25px 0;
      backdrop-filter: blur(10px);
      box-shadow:
        inset 0 0 22px rgba(157, 77, 255, 0.14),
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 14px 30px rgba(0,0,0,0.22),
        0 0 18px rgba(216, 169, 63, 0.08);
    }

    .control-panel h2{
      font-size:0.9rem;
      margin-bottom:15px;
      color:var(--gold-soft);
      text-transform:uppercase;
      letter-spacing:1.5px;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .control-panel h2::before{
      content:"";
      width:4px;
      height:14px;
      background:linear-gradient(180deg, var(--gold-soft), var(--gold-main));
      display:inline-block;
      border-radius:999px;
    }

    .btn-group{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      justify-content:center;
      padding:10px 0;
    }

    button{
      position:relative;
      padding:14px 26px;
      border:2px solid currentColor;
      border-radius:10px;
      cursor:pointer;
      font-weight:800;
      transition: all .25s cubic-bezier(0.4, 0, 0.2, 1);
      font-size:14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
      text-transform:uppercase;
      letter-spacing:1px;
      touch-action:manipulation;
      overflow:hidden;
    }

    button::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.16) 50%, transparent 100%);
      transform:translateX(-130%);
      transition:transform .35s ease;
    }

    button:hover::before{
      transform:translateX(130%);
    }

    .active-btn{
      background:
        linear-gradient(135deg, rgba(255, 218, 118, 0.98) 0%, rgba(216, 169, 63, 0.96) 42%, rgba(115, 52, 201, 0.98) 100%) !important;
      color:#14081b !important;
      border-color:var(--gold-hot) !important;
      box-shadow:
        0 0 10px rgba(255, 211, 107, 0.7),
        0 0 24px rgba(157, 77, 255, 0.42),
        inset 0 0 12px rgba(255,255,255,0.18),
        0 8px 20px rgba(0,0,0,0.25);
    }

    .inactive-btn{
      color:#dac3f3;
      border-color:rgba(194, 124, 255, 0.48);
      box-shadow:
        inset 0 0 10px rgba(157, 77, 255, 0.08),
        0 0 12px rgba(157, 77, 255, 0.06);
    }

    .inactive-btn:hover{
      color:#f2e8ff;
      border-color:rgba(245, 217, 143, 0.82);
      background:rgba(157, 77, 255, 0.12);
      box-shadow:
        0 0 10px rgba(245, 217, 143, 0.12),
        0 0 20px rgba(157, 77, 255, 0.14);
    }

    .shuffle-btn{
      color:var(--gold-main);
      border-color:var(--gold-main);
      margin-left:20px;
      box-shadow:
        inset 0 0 10px rgba(255, 211, 107, 0.08),
        0 0 14px rgba(216, 169, 63, 0.08);
    }

    .shuffle-btn:active{
      background:linear-gradient(135deg, var(--gold-hot), var(--gold-main));
      color:#241128;
      transform: translateY(2px);
    }

    @media (max-width: 480px){
      .btn-group{ gap:10px; }
      .btn-group button{ flex:1 1 120px; }
      .shuffle-btn{ margin-left:0; }
      header{ padding:16px 14px; }
      .container{ padding:12px; }
      .site-logo{ width:min(92vw, 360px); }
    }

    .table-container{
      position:relative;
      width: min(var(--table-vw), var(--table-max));
      margin: 14px auto 6px;
      aspect-ratio: 16 / 9;
      background:
        linear-gradient(135deg, #262126 0%, #161217 52%, #080609 100%);
      border:4px solid #050506;
      border-radius: clamp(12px, 3vw, 24px);
      padding: var(--rail);
      box-shadow:
        0 15px 40px rgba(0,0,0,0.8),
        0 0 18px rgba(255, 211, 107, 0.18),
        0 0 32px rgba(157, 77, 255, 0.18),
        inset 0 0 0 1px rgba(240, 210, 141, 0.16);
    }

    .table-container::before{
      content:"";
      position:absolute;
      inset:8px;
      border-radius: inherit;
      pointer-events:none;
      border:1px solid rgba(255, 211, 107, 0.1);
      box-shadow: inset 0 0 18px rgba(157, 77, 255, 0.08);
    }

    .table-surface{
      position:absolute;
      inset: var(--rail);
      background:
        radial-gradient(circle at 50% 45%, rgba(255,255,255,0.05) 0%, transparent 42%),
        linear-gradient(180deg, #707070 0%, var(--felt) 100%);
      border-radius: clamp(8px, 2vw, 15px);
      overflow:hidden;
      box-shadow:
        inset 0 0 60px rgba(0,0,0,0.3),
        inset 0 0 0 1px rgba(255,255,255,0.06);
    }

    .table-surface::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(transparent 0%, rgba(255,255,255,0.025) 50%, transparent 100%),
        repeating-linear-gradient(
          0deg,
          transparent 0 22px,
          rgba(255, 211, 107, 0.018) 22px 23px,
          transparent 23px 46px
        );
      mix-blend-mode:screen;
      opacity:0.65;
    }

    .andy-side-logo{
      position:absolute;
      top:50%;
      width: clamp(120px, 16vw, 240px);
      opacity:0.82;
      pointer-events:none;
      filter: sepia(0.35) hue-rotate(275deg) saturate(0.75) brightness(1.05);
    }

    .logo-left{
      left: clamp(-26px, -2.5vw, -16px);
      transform: translateY(-50%) rotate(-90deg);
    }

    .logo-right{
      right: clamp(-26px, -2.5vw, -16px);
      transform: translateY(-50%) rotate(90deg);
    }

    .spot{
      position:absolute;
      top:50%;
      left:50%;
      width: clamp(8px, 1.2vw, 14px);
      height: clamp(8px, 1.2vw, 14px);
      background: rgba(255, 211, 107, 0.22);
      border-radius:50%;
      transform: translate(-50%,-50%);
      box-shadow:
        0 0 10px rgba(216, 169, 63, 0.28),
        0 0 20px rgba(157, 77, 255, 0.12);
    }

    #ballsContainer{
      position:absolute;
      top:50%;
      left:50%;
      transform: translate(-50%,-50%);
      width: 92%;
      height: 92%;
      pointer-events:none;
    }

    .ball{
      position:absolute;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      transform: translate(-50%,-50%);
      box-shadow:
        inset -4px -4px 8px rgba(0,0,0,0.5),
        inset 4px 4px 8px rgba(255,255,255,0.3),
        0 4px 8px rgba(0,0,0,0.4);
      transition: all 0.25s cubic-bezier(0.18, 0.89, 0.32, 1.28);
      touch-action: manipulation;
      z-index:20;
      user-select:none;
    }

    .ball:hover{
      transform: translate(-50%,-50%) scale(1.12);
      z-index:30;
      box-shadow:0 10px 20px rgba(0,0,0,0.6);
    }

    @keyframes dropIn{
      0%{ transform: translate(-50%,-100px) scale(0.3); opacity:0; }
      100%{ transform: translate(-50%,-50%) scale(1); opacity:1; }
    }

    .animate-drop{
      animation: dropIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    footer{
      text-align:center;
      padding:26px 20px;
      color:#9f86bb;
      font-size:0.75rem;
      letter-spacing:1px;
      text-shadow:0 0 12px rgba(157, 77, 255, 0.08);
    }
  </style>
</head>

<body>
  <header>
    <div class="container header-content">
      <img src="./icons/2026APC_final.png" alt="Logo" class="site-logo">
      <div class="header-text">
        <h1>Billiard Racking System</h1>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="control-panel">
      <h2>Switch Protocol</h2>
      <div class="btn-group">
        <button id="nineBallBtn">9 Ball</button>
        <button id="tenBallBtn">10 Ball</button>
        <button id="shuffleBtn" class="shuffle-btn">Reshuffle</button>
      </div>
    </div>

    <div class="table-container">
      <div class="table-surface" id="tableSurface">
        <img src="./icons/logo-andy.png" class="andy-side-logo logo-left">
        <img src="./icons/logo-andy.png" class="andy-side-logo logo-right">

        <div class="spot"></div>
        <div id="ballsContainer"></div>
      </div>
    </div>
  </div>

  <footer>
    <p>OFFICIAL RACK SYSTEM</p>
    <p style="margin-top: 5px;">© 2026 Rack Assistant</p>
  </footer>

  <script>
    // 经典色值方案
    const ballColors = {
      1: '#FFCC00', 2: '#0066FF', 3: '#FF0000', 4: '#9900CC', 5: '#FF9900',
      6: '#00CC66', 7: '#CC6600', 8: '#000000',
      9: 'radial-gradient(circle at 30% 30%, white 0%, white 45%, #FFCC00 45%, #FFCC00 100%)',
      10:'radial-gradient(circle at 30% 30%, white 0%, white 45%, #0066FF 45%, #0066FF 100%)'
    };

    const textColors = {
      1: '#000', 2: '#FFF', 3: '#FFF', 4: '#FFF', 5: '#000',
      6: '#000', 7: '#FFF', 8: '#FFF', 9: '#000', 10: '#000'
    };

    let currentGameType = 'nine';

    const nineBallBtn = document.getElementById('nineBallBtn');
    const tenBallBtn  = document.getElementById('tenBallBtn');
    const shuffleBtn  = document.getElementById('shuffleBtn');
    const ballsContainer = document.getElementById('ballsContainer');
    const tableSurface = document.getElementById('tableSurface');

    function updateButtons(){
      nineBallBtn.className = currentGameType === 'nine' ? 'active-btn' : 'inactive-btn';
      tenBallBtn.className  = currentGameType === 'ten'  ? 'active-btn' : 'inactive-btn';
    }

    function shuffle(arr){
      for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function generateOrder(type){
      if(type === 'nine'){
        const others = [2,3,4,5,6,7,8];
        shuffle(others);
        return [1, others[0], others[1], others[2], 9, others[3], others[4], others[5], others[6]];
      }else{
        const others = [2,3,4,5,6,7,8,9];
        shuffle(others);
        return [1, others[0], others[1], others[2], 10, others[3], others[4], others[5], others[6], others[7]];
      }
    }

    function calculatePositions(type, ballSize){
      const positions = [];
      const gapRatio = 0.505;

      if(type === 'nine'){
        const hGap = ballSize * gapRatio;
        const vGap = ballSize * 0.81;
        const rowY = [-2, -1, 0, 1, 2];

        positions.push({ x: 0,          y: rowY[0] * vGap });
        positions.push({ x: -0.7*hGap,  y: rowY[1] * vGap });
        positions.push({ x:  0.7*hGap,  y: rowY[1] * vGap });
        positions.push({ x: -1.4*hGap,  y: rowY[2] * vGap });
        positions.push({ x: 0,          y: rowY[2] * vGap });
        positions.push({ x:  1.4*hGap,  y: rowY[2] * vGap });
        positions.push({ x: -0.7*hGap,  y: rowY[3] * vGap });
        positions.push({ x:  0.7*hGap,  y: rowY[3] * vGap });
        positions.push({ x: 0,          y: rowY[4] * vGap });
      }else{
        const gap = ballSize * 0.91;
        const rowY = [-1.5, -0.5, 0.5, 1.5];

        positions.push({ x: 0,        y: rowY[0] * gap });
        positions.push({ x: -0.5*gap, y: rowY[1] * gap });
        positions.push({ x:  0.5*gap, y: rowY[1] * gap });
        positions.push({ x: -1*gap,   y: rowY[2] * gap });
        positions.push({ x: 0,        y: rowY[2] * gap });
        positions.push({ x:  1*gap,   y: rowY[2] * gap });
        positions.push({ x: -1.5*gap, y: rowY[3] * gap });
        positions.push({ x: -0.5*gap, y: rowY[3] * gap });
        positions.push({ x:  0.5*gap, y: rowY[3] * gap });
        positions.push({ x:  1.5*gap, y: rowY[3] * gap });
      }

      return positions;
    }

    function clamp(n, min, max){
      return Math.max(min, Math.min(max, n));
    }

    // ✅ 统一比例：ballSize & fontSize 都由“桌面可用宽度”计算
    function computeBallSize(){
      // 使用 tableSurface 的可用宽度（比 ballsContainer 更稳定）
      const w = tableSurface.clientWidth;

      // 9球：宽度约 3 个球 + 间距；10球：约 4 个球 + 间距
      // 用更稳定的“占宽比例”算直径
      const base = (currentGameType === 'nine')
        ? Math.floor(w / 7.2)   // 9球稍大
        : Math.floor(w / 8.6);  // 10球稍小

      // 给一个合理 clamp：小屏不爆，大屏够大
      return clamp(base, 30, 110);
    }

    function computeFontSize(ballSize){
      // 数字大小 = 球直径的比例（统一比例核心）
      // 你之前希望更大：0.46~0.50 都可以
      const fs = Math.floor(ballSize * 0.48);
      return clamp(fs, 14, 46);
    }

    function renderBalls(){
      ballsContainer.innerHTML = '';

      const ballSize = computeBallSize();
      const fontSize = computeFontSize(ballSize);

      const order = generateOrder(currentGameType);
      const positions = calculatePositions(currentGameType, ballSize);

      order.forEach((num, index) => {
        const pos = positions[index];
        const ball = document.createElement('div');
        ball.className = 'ball';

        ball.style.width = ballSize + 'px';
        ball.style.height = ballSize + 'px';
        ball.style.left = `calc(50% + ${pos.x}px)`;
        ball.style.top  = `calc(50% + ${pos.y}px)`;

        ball.style.background = ballColors[num];
        ball.style.color = textColors[num];
        ball.style.fontSize = fontSize + 'px';

        ball.textContent = num;
        ballsContainer.appendChild(ball);

        setTimeout(() => ball.classList.add('animate-drop'), index * 35);
      });
    }

    nineBallBtn.addEventListener('click', () => {
      currentGameType = 'nine';
      updateButtons();
      renderBalls();
    });

    tenBallBtn.addEventListener('click', () => {
      currentGameType = 'ten';
      updateButtons();
      renderBalls();
    });

    shuffleBtn.addEventListener('click', () => {
      renderBalls();
    });

    // ✅ ResizeObserver：比 window.resize 更可靠（PWA/地址栏变化/横竖切换）
    const ro = new ResizeObserver(() => renderBalls());
    ro.observe(tableSurface);

    document.addEventListener('DOMContentLoaded', () => {
      updateButtons();
      renderBalls();
    });
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js")
          .then(() => console.log("Service Worker registered"))
          .catch(err => console.log("SW registration failed:", err));
      });
    }
  </script>
</body>
</html>
